spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: dracolich-mtg-library-api
  webflux:
    base-path: dracolich/mtg-library/api/v0/
  mongodb:
    database: ${MONGODB_DATABASE}
    uri: ${MONGODB_URI}
    representation:
      uuid: standard

server:
  port: ${PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

management:
  server:
    port: 7980
  endpoints:
    web:
      exposure:
        include: health, info
    endpoint:
      health:
        show-details: true
        probes:
          enabled: true
